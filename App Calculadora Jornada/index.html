<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Jornada DENSO</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Jornada">

<style>

:root{
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#111827;
  --accent:#2563eb;
  --success:#16a34a;

  --msg-bg:#eef2ff;
  --msg-text:#111827;
}

/* 🌙 DARK MODE */
body.dark {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --accent:#3b82f6;
  --success:#22c55e;

  --msg-bg:#1e3a8a;
  --msg-text:#ffffff;
}

*{
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  padding:16px;
  overflow-x:hidden;
}

.container{
  max-width:480px;
  margin:auto;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  margin-bottom:16px;
}

h1{
  text-align:center;
  margin-top:0;
  margin-bottom:10px;
  font-size:24px;
}

.info{
  text-align:center;
  font-size:14px;
  opacity:.8;
  margin-bottom:20px;
  line-height:1.5;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:600;
}

input[type="time"]{
  display:block;
  width:100%;
  height:52px;

  padding:0 12px;

  line-height:52px;
  vertical-align:middle;

  font-size:18px;
  color:var(--text);
  background:var(--card);

  border:1px solid #d1d5db;
  border-radius:12px;

  box-sizing:border-box;
  -webkit-appearance:none;
  appearance:none;
}

button{
  width:100%;
  margin-top:14px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

button.danger{
  background:#ef4444;
}

.result{
  display:none;
  margin-top:24px;
}

.big{
  text-align:center;
  font-size:40px;
  font-weight:800;
  color:var(--success);
  margin-bottom:18px;
}

.row{
  margin-top:10px;
  font-size:15px;
}

.msg{
  margin-top:16px;
  padding:14px;
  border-radius:12px;
  background:var(--msg-bg);
  color:var(--msg-text);
  font-weight:600;
}

.footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  opacity:.7;
}

</style>
</head>

<body>

<div class="container">

<button onclick="toggleDark()" style="margin-bottom:10px;">
🌙 / ☀️ Modo oscuro
</button>

<div class="card">

<h1>🕒 Calculadora de Salida</h1>

<div class="info">
Jornada laboral: <b>9 h 51 min</b><br>
Tolerancia: <b>Primeros 10 min de cada hora</b>
</div>

<label>Hora de entrada:</label>

<input type="time" id="entrada">

<button onclick="calcular()">Calcular salida</button>

<div id="resultado" class="result">

<div class="big" id="salida"></div>

<div class="row"><b>Hora registrada:</b> <span id="reg"></span></div>
<div class="row"><b>Hora considerada:</b> <span id="cons"></span></div>
<div class="row"><b>Tolerancia aplicada:</b> <span id="tol"></span></div>
<div class="row"><b>Minutos a recuperar:</b> <span id="rec"></span></div>

<div id="mensaje" class="msg"></div>

</div>

</div>

<!-- HISTORIAL -->
<div class="card">
  <h3>📅 Historial por día</h3>
  <div id="listaHistorial"></div>

  <button class="danger" onclick="limpiarHistorial()">
    Limpiar historial
  </button>
</div>

<div class="footer">
Versión PRO • Jornada DENSO
</div>

</div>

<script>

function format12(date){
let h = date.getHours();
let m = date.getMinutes();
const ampm = h >= 12 ? "PM" : "AM";
h = h % 12;
h = h ? h : 12;
return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

// CALCULO
function calcular(){

const valor = document.getElementById("entrada").value;
if(!valor) return;

const [h,m] = valor.split(":").map(Number);

const minutosRecuperar = Math.max(0, m - 10);
const tolerancia = m <= 10;

const registrada = new Date();
registrada.setHours(h,m,0,0);

const considerada = new Date();
considerada.setHours(h,0,0,0);

const salida = new Date(considerada);
salida.setMinutes(salida.getMinutes() + 591 + minutosRecuperar);

// UI
document.getElementById("resultado").style.display = "block";

document.getElementById("salida").textContent = format12(salida);
document.getElementById("reg").textContent = format12(registrada);
document.getElementById("cons").textContent = format12(considerada);
document.getElementById("tol").textContent = tolerancia ? "Sí ✅" : "No ❌";
document.getElementById("rec").textContent = `${minutosRecuperar} min`;

document.getElementById("mensaje").textContent =
tolerancia
? `🟢 Se aplicó la tolerancia.`
: `⏰ Debes recuperar ${minutosRecuperar} min.`;

// GUARDAR HISTORIAL
const historial = JSON.parse(localStorage.getItem("historialJornada")) || [];

const hoy = new Date();
const fechaKey = hoy.toLocaleDateString("es-MX");

historial.unshift({
  entrada: format12(registrada),
  salida: format12(salida),
  recuperacion: minutosRecuperar,
  tolerancia: tolerancia,
  fecha: fechaKey,
  timestamp: Date.now()
});

localStorage.setItem("historialJornada", JSON.stringify(historial));

renderHistorial();

}

// HISTORIAL AGRUPADO POR DÍA
function renderHistorial(){

const data = JSON.parse(localStorage.getItem("historialJornada")) || [];
const cont = document.getElementById("listaHistorial");

if(data.length === 0){
  cont.innerHTML = "<p>No hay registros aún.</p>";
  return;
}

// agrupar por fecha
const agrupado = {};

data.forEach(item => {
  if(!agrupado[item.fecha]) agrupado[item.fecha] = [];
  agrupado[item.fecha].push(item);
});

cont.innerHTML = Object.keys(agrupado).map(fecha => {

  const items = agrupado[fecha].map(i => `
    <div style="
      padding:10px;
      border:1px solid #e5e7eb;
      border-radius:10px;
      margin-top:8px;
      font-size:14px;
      background:var(--card);
    ">
      <b>Entrada:</b> ${i.entrada}<br>
      <b>Salida:</b> ${i.salida}<br>
      <b>Recuperación:</b> ${i.recuperacion} min<br>
      <b>Tolerancia:</b> ${i.tolerancia ? "Sí" : "No"}
    </div>
  `).join("");

  return `
    <div style="margin-bottom:18px;">
      <h4 style="margin:10px 0;">📅 ${fecha}</h4>
      ${items}
    </div>
  `;
}).join("");

}

// LIMPIAR
function limpiarHistorial(){
localStorage.removeItem("historialJornada");
renderHistorial();
}

// DARK MODE
function toggleDark(){
document.body.classList.toggle("dark");

const isDark = document.body.classList.contains("dark");
localStorage.setItem("darkMode", isDark ? "1" : "0");
}

// INIT
window.addEventListener("load", () => {
  renderHistorial();

  if(localStorage.getItem("darkMode") === "1"){
    document.body.classList.add("dark");
  }
});

// if ('serviceWorker' in navigator) {
//   navigator.serviceWorker.register('sw.js');
// }

</script>

</body>
</html>
